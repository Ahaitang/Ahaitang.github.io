<style>
.post-categories {
  margin: 10px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.post-meta-label {
  font-size: 0.9em;
  color: var(--secondary, #666);
}

.post-category-tag {
  background: var(--primary, #2196f3);
  color: #fff;
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 0.85em;
}

.post-tags-header {
  margin: 10px 0;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.post-tag-item {
  background: var(--border, #e0e0e0);
  color: var(--secondary, #666);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.8em;
}

@media (prefers-color-scheme: dark) {
  .post-meta-label {
    color: #aaa;
  }

  .post-category-tag {
    background: #4fc3f7;
    color: #000;
  }

  .post-tag-item {
    background: #333;
    color: #aaa;
  }
}
</style>
